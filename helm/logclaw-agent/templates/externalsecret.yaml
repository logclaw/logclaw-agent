{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "logclaw-agent.fullname" . }}-jwt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logclaw-agent.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ .Values.agent.jwtSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.agent.jwtSecretKey | quote }}
      remoteRef:
        key: {{ include "logclaw-agent.remoteKey" . }}
{{- end }}
