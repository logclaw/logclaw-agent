name: Build & Push Container Image

on:
  push:
    branches: [main]
    paths:
      - "*.go"
      - "collectors/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "*.go"
      - "collectors/**"
      - "Dockerfile"
  workflow_dispatch:

# Cancel in-flight runs for the same branch
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/logclaw-agent

jobs:
  build:
    name: Build logclaw-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Read version from VERSION file or go.mod ──
      - name: Read app version
        id: version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 logclaw-agent version: $VERSION"

      # ── Docker Buildx (multi-arch) ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GHCR ──
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata (tags + labels) ──
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Semantic version from VERSION file
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            # Git SHA (always, for traceability)
            type=sha,prefix=sha-,format=short
            # latest (only on main)
            type=raw,value=latest,enable={{is_default_branch}}
            # PR number (for PR builds)
            type=ref,event=pr

      # ── Build + Push ──
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy vulnerability scan (report only, never blocks push) ──
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      # ── Summary ──
      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🐳 logclaw-agent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`${{ steps.version.outputs.version }}\`, \`sha-${GITHUB_SHA::7}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
